events {
    worker_connections 1024;
}

http {
    server {

        listen 80;

        server_name www.andytest.com;

        root /path/to/src/main/webapp;  # 换成项目webapp地址


    #     access_log /var/log/nginx/webapp_access_log;
    #     error_log  /var/log/nginx/webapp_error_log;

        access_log /Users/andyron/Downloads/webapp_access_log;
        error_log  /Users/andyron/Downloads/webapp_error_log;

        location /static {
        }

        location /favicon.ico {
        }

        location /WEB-INF {
            return 404;
        }

        location / {
            proxy_pass       http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

